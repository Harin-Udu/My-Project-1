{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'salon/css/style.css' %}">
</head>
<body>

<div class="signup-container">
    <h2 class="signup-title">Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="signup-btn">Sign Up</button>
    </form>
</div>

</body>
</html>
